apiVersion: v1
kind: Deployment
metadata:
  name: nginx-Deployment
  labels:
    app: nginx
  
spec:
  replicas: 3
  selector: 
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
readinessProbe:
  httpGet:
    path: /
    port: 80  
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 1
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThresshold: 3
  successThreshold: 1
  timeoutSeconds: 1


----
apiVersion: v1
kind: Service
metadata:   
  name: nginx-service
spec:
  selector:
    app: nginx
  ports:
  - protocol: TCP   
    port: 80
    targetPort: 80
  type: LoadBalancer
  

  ----
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
spec:
  rules:
  - host: nginx.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80 




